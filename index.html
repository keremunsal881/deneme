    <style>
        :root { --gold: #FFD700; --bg: #111; --card: #1e1e1e; }

        header { padding: 30px; border-bottom: 3px solid var(--gold); background: #1a1a1a; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }

        .name { margin-top: 10px; font-size: 0.9em; text-transform: uppercase; color: var(--gold); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal-content { background: #1a1a1a; padding: 30px; border-radius: 25px; max-width: 450px; width: 85%; border: 3px solid var(--gold); position: relative; }
        .close { position: absolute; top: 10px; right: 20px; font-size: 30px; cursor: pointer; color: #ff4444; }
        .modal-img { width: 150px; height: 150px; border-radius: 20px; border: 3px solid var(--gold); margin-bottom: 20px; }
        .modal-text { font-family: 'Segoe UI', sans-serif; line-height: 1.6; font-size: 1.1em; color: #eee; }
    </style>
</head>
